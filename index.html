<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>エアコン診断ツール</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:#f3f6fb;color:#111}
.app{max-width:520px;margin:auto;min-height:100vh;padding:10px}
.card{background:white;border-radius:22px;padding:16px;box-shadow:0 8px 26px #00000014;text-align:center}
.homeFull{min-height:calc(100vh - 20px);padding:0;overflow:hidden}
.homeSplit{display:flex;flex-direction:column;gap:14px;min-height:calc(100vh - 20px)}
.homePanel{border:0;border-radius:22px;padding:30px 18px;min-height:44vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-weight:900}
.homePanel.maker{background:radial-gradient(circle,#fff 0%,#eef9ff 42%,#d9f0ff 100%);color:#003b8f}
.homePanel.cost{background:radial-gradient(circle,#fff 0%,#f4fff0 42%,#dff8d8 100%);color:#00754a}
.homePanelTitle{font-size:38px;line-height:1.2;margin-bottom:24px}
.homePanelSub{font-size:18px;color:#111;line-height:1.5;margin-bottom:28px}
.homeStart{border:4px solid white;border-radius:9999px;padding:18px;width:100%;max-width:320px;color:white;font-size:24px;font-weight:900;box-shadow:0 10px 24px #0003}
.homePanel.maker .homeStart{background:#005cff}
.homePanel.cost .homeStart{background:#009955}
h1{font-size:25px;line-height:1.35;margin:16px 0}
.btn{display:block;width:100%;margin:12px auto;padding:18px 14px;border:3px solid #0046ad;background:white;color:#003b8f;border-radius:16px;font-size:22px;font-weight:900}
.btn.primary{background:#0046ad;color:white}
.btn.small{font-size:16px;padding:10px;max-width:140px;margin:0 0 10px 0}
.sub{font-size:22px;font-weight:900;line-height:1.5;margin:16px 0}
.choiceGrid,.grid,.rankWrap{display:grid;grid-template-columns:1fr;gap:12px}
.choice{border:3px solid #d7e0f0;border-radius:18px;background:white;padding:18px;font-weight:900;color:#003b8f;text-align:left}
.choiceNo{display:inline-flex;width:34px;height:34px;border-radius:50%;background:#eaf2ff;align-items:center;justify-content:center;font-size:18px;margin-right:8px}
.choiceMain{font-size:24px}
.choiceDesc{display:block;color:#333;font-size:16px;margin-top:8px;padding-left:46px;line-height:1.4}
.option{border:3px solid #cfd8e8;border-radius:18px;background:white;padding:18px 12px;font-size:22px;font-weight:900;color:#003b8f}
.notice{background:#fff8dc;border-radius:16px;padding:14px;margin-top:18px;text-align:left;font-size:16px;line-height:1.7}
.progress{height:10px;background:#d8deea;border-radius:10px;margin-top:8px;overflow:hidden}
.bar{height:100%;background:#0068ff}
.resultPrice{font-size:46px;font-weight:900;color:#003b8f;margin:14px 0}
.detail{font-size:16px;text-align:left;display:inline-block;line-height:1.8}
.tapImage{position:relative;width:100%;margin-top:10px}
.tapImage img{width:100%;display:block;border-radius:14px;border:1px solid #ddd}
.hot{position:absolute;background:transparent;border:0}
.h1{left:2%;top:9%;width:96%;height:11%}
.h2{left:2%;top:21%;width:96%;height:11%}
.h3{left:2%;top:33%;width:96%;height:11%}
.h4{left:2%;top:45%;width:96%;height:11%}
.h5{left:2%;top:57%;width:96%;height:11%}
.h6{left:2%;top:69%;width:96%;height:11%}
.h7{left:2%;top:81%;width:96%;height:11%}
.p1{left:3%;top:14%;width:94%;height:25%}
.p2{left:3%;top:41%;width:94%;height:25%}
.p3{left:3%;top:68%;width:94%;height:24%}
.resultHero{background:linear-gradient(135deg,#003b8f,#0068ff);color:white;border-radius:20px;padding:20px;margin:18px 0 22px;box-shadow:0 10px 24px #003b8f33}
.resultHeroTitle{font-size:18px;font-weight:900}
.resultHeroMain{font-size:28px;font-weight:900;margin-top:8px}
.resultType{background:#eef5ff;border:3px solid #cfe0ff;border-radius:18px;padding:18px;margin:18px 0;color:#003b8f}
.resultTypeSmall{font-size:16px;font-weight:900}
.resultTypeMain{font-size:24px;font-weight:900;margin-top:6px}
.resultTypeText{font-size:16px;color:#222;margin-top:8px;line-height:1.5}
.rankBox{border-radius:20px;padding:20px;text-align:left;box-shadow:0 8px 22px #00000012}
.rankBox.first{background:linear-gradient(135deg,#ffffff,#eef5ff);border:4px solid #0068ff}
.rankBox.second{background:#ffffff;border:3px solid #d8e3f7}
.rankLabel{display:inline-block;background:#003b8f;color:white;border-radius:999px;padding:8px 16px;font-size:16px;font-weight:900;margin-bottom:12px}
.rankBox.second .rankLabel{background:#6d7f9d}
.rankTitle{font-size:32px;font-weight:900;color:#003b8f;line-height:1.1}
.rankSub{font-size:18px;font-weight:900;margin:14px 0;color:#222;line-height:1.4}
.rankPoint{font-size:16px;line-height:1.8;margin-top:14px}
.badge{display:inline-block;background:#eaf2ff;color:#003b8f;border-radius:999px;padding:7px 14px;font-size:15px;font-weight:900;margin:4px}
</style>
</head>

<body>
<div class="app"><div id="screen"></div></div>

<script>
const imgInstall="32463253-BEAC-4576-B975-013AE03AD4E8.png";
const imgPiping="19562BFC-193C-4A64-AC36-4A6C1B25F96E.png";

const state={};
let step="home";
let history=[];

const base={small:20350,medium:24750,large:28050};
const removalFee=6600;
const recycleFee=4070;

const installNew={
standard:{small:0,medium:0,large:0},
wall:{small:16500,medium:18700,large:18700},
koudan:{small:16500,medium:18700,large:18700},
roof:{small:15400,medium:17600,large:17600},
two:{small:19800,medium:20900,large:20900},
second:{small:19800,medium:19800,large:19800},
third:{small:36300,medium:36300,large:36300}
};

const installReplace={
standard:{small:0,medium:0,large:0},
wall:{small:8250,medium:10450,large:10450},
koudan:{small:8250,medium:10450,large:10450},
roof:{small:7700,medium:9900,large:9900},
twoUpper:{small:2750,medium:3300,large:3300},
twoLower:{small:7150,medium:8250,large:8250},
second:{small:19800,medium:19800,large:19800},
third:{small:36300,medium:36300,large:36300}
};

function yen(n){return "¥"+n.toLocaleString()+"〜"}

function label(v){
return {
small:"6〜12畳",medium:"14〜18畳",large:"20畳以上",
new:"新規取付",replace:"買い替え",
senior:"65歳以上",disabled:"障害者手帳あり",none:"該当しない",unknown:"わからない",
house:"戸建て",apartment:"マンション/アパート",
first:"1階",upper:"2階以上",yes:"はい",no:"いいえ",
standard:"標準設置",wall:"壁掛け",koudan:"公団吊り",roof:"屋根置き",two:"二段置き",
second:"室内機2階→室外機1階",third:"室内機3階→室外機1階",
normal:"標準配管",hidden:"隠蔽配管",
upperPos:"上段",lowerPos:"下段",indoor:"内階段",outdoor:"外階段"
}[v]||v
}

function next(to){history.push(step);step=to;render()}
function back(){if(history.length){step=history.pop();render()}}
function go(key,val,to){state[key]=val;next(to)}

function makeScreen(title,html,percent){
document.getElementById("screen").innerHTML=`
<div class="card">
${history.length?`<button class="btn small" onclick="back()">← 戻る</button>`:""}
<div class="progress"><div class="bar" style="width:${percent}%"></div></div>
<h1>${title}</h1>
${html}
</div>`;
}

function render(){
if(step==="home"){
document.getElementById("screen").innerHTML=`
<div class="card homeFull">
  <div class="homeSplit">
    <button class="homePanel maker" onclick="next('makerConcern')">
      <div class="homePanelTitle">エアコン<br>メーカー診断</div>
      <div class="homePanelSub">あなたに合うエアコンメーカーを診断！</div>
      <div class="homeStart">診断をはじめる！ ＞</div>
    </button>
    <button class="homePanel cost" onclick="next('type')">
      <div class="homePanelTitle">工事費<br>診断</div>
      <div class="homePanelSub">設置費用の目安を診断！</div>
      <div class="homeStart">診断をはじめる！ ＞</div>
    </button>
  </div>
</div>`;
return;
}

if(step==="type") makeScreen("新規取付ですか？買い替えですか？",`<button class="btn" onclick="go('type','new','tokyo')">新規取付</button><button class="btn" onclick="go('type','replace','tokyo')">買い替え</button>`,8);

if(step==="tokyo") makeScreen("お住まいは東京都ですか？",`<button class="btn" onclick="goTokyo('yes')">はい</button><button class="btn" onclick="goTokyo('no')">いいえ</button>`,16);

if(step==="zero") makeScreen("あなたは以下のいずれかに該当しますか？",`
<button class="btn" onclick="goZero('senior')">65歳以上</button>
<button class="btn" onclick="goZero('disabled')">障害者手帳を持っている</button>
<button class="btn" onclick="goZero('none')">該当しない</button>
<button class="btn" onclick="goZero('unknown')">わからない</button>`,24);

if(step==="oldAge") makeScreen("現在お使いのエアコンは？",`
<button class="btn" onclick="go('oldAge','15over','size')">15年以上使用している</button>
<button class="btn" onclick="go('oldAge','under15','size')">15年未満</button>
<button class="btn" onclick="go('oldAge','unknown','size')">わからない</button>`,32);

if(step==="size") makeScreen("購入したいエアコンは何畳用ですか？",`
<button class="btn" onclick="go('size','small','building')">6畳</button>
<button class="btn" onclick="go('size','small','building')">8畳</button>
<button class="btn" onclick="go('size','small','building')">10畳</button>
<button class="btn" onclick="go('size','small','building')">12畳</button>
<button class="btn" onclick="go('size','medium','building')">14畳</button>
<button class="btn" onclick="go('size','medium','building')">18畳</button>
<button class="btn" onclick="go('size','large','building')">20畳以上</button>`,40);

if(step==="building") makeScreen("お住まいの種類を選んでください",`
<div class="grid">
<button class="option" onclick="go('building','house','install')">戸建て</button>
<button class="option" onclick="go('building','apartment','floor')">マンション/アパート</button>
</div>`,48);

if(step==="floor") makeScreen("お住まいの階数は？",`
<button class="btn" onclick="go('floor','first','install')">1階</button>
<button class="btn" onclick="go('floor','upper','elevator')">2階以上</button>`,56);

if(step==="elevator") makeScreen("エレベーターはありますか？",`
<button class="btn" onclick="go('elevator','yes','install')">あり</button>
<button class="btn" onclick="go('elevator','no','stairsBeforeInstall')">なし</button>`,64);

if(step==="stairsBeforeInstall") makeScreen("室外機を階段で運ぶ必要がありますか？",`
<button class="btn" onclick="go('stairs','none','install')">なし</button>
<button class="btn" onclick="go('stairs','indoor','install')">内階段</button>
<button class="btn" onclick="go('stairs','outdoor','install')">外階段</button>
<button class="btn" onclick="go('stairs','unknown','install')">わからない</button>`,68);

if(step==="install") makeScreen("設置方法を選んでください",`
<div class="tapImage">
<img src="${imgInstall}">
<button class="hot h1" onclick="goInstall('standard')"></button>
<button class="hot h2" onclick="goInstall('wall')"></button>
<button class="hot h3" onclick="goInstall('koudan')"></button>
<button class="hot h4" onclick="goInstall('roof')"></button>
<button class="hot h5" onclick="goInstall('two')"></button>
<button class="hot h6" onclick="goInstall('second')"></button>
<button class="hot h7" onclick="goInstall('third')"></button>
</div>`,72);

if(step==="houseStandardFloor") makeScreen("室内機を設置する階は？",`
<button class="btn" onclick="go('houseFloor','first','piping')">1階</button>
<button class="btn" onclick="go('houseFloor','secondFloor','stairsAfterHouseStandard')">2階</button>
<button class="btn" onclick="go('houseFloor','thirdFloor','stairsAfterHouseStandard')">3階</button>`,76);

if(step==="stairsAfterHouseStandard") makeScreen("室外機を階段で運ぶ必要がありますか？",`
<button class="btn" onclick="go('stairs','none','piping')">なし</button>
<button class="btn" onclick="go('stairs','indoor','piping')">内階段</button>
<button class="btn" onclick="go('stairs','outdoor','piping')">外階段</button>
<button class="btn" onclick="go('stairs','unknown','piping')">わからない</button>`,80);

if(step==="twoPos") makeScreen("二段置きのどちらですか？",`
<button class="btn" onclick="go('twoPos','upperPos','piping')">上段</button>
<button class="btn" onclick="go('twoPos','lowerPos','piping')">下段</button>`,80);

if(step==="piping") makeScreen("配管の種類を選んでください",`
<div class="tapImage">
<img src="${imgPiping}">
<button class="hot p1" onclick="goPiping('normal')"></button>
<button class="hot p2" onclick="goPiping('hidden')"></button>
<button class="hot p3" onclick="goPiping('unknown')"></button>
</div>`,88);

if(step==="result") result();

if(step==="makerConcern") makeScreen("一番重視したいことは？",`
<div class="choiceGrid">
<button class="choice" onclick="go('concern','bodyPrice','makerResult')"><span class="choiceNo">1</span><span class="choiceMain">本体代</span><span class="choiceDesc">初期費用を抑えたい</span></button>
<button class="choice" onclick="go('concern','electric','makerResult')"><span class="choiceNo">2</span><span class="choiceMain">電気代</span><span class="choiceDesc">長く使う電気代を抑えたい</span></button>
<button class="choice" onclick="go('concern','clean','makerCleaning')"><span class="choiceNo">3</span><span class="choiceMain">掃除・清潔性</span><span class="choiceDesc">清潔に使いたい</span></button>
<button class="choice" onclick="go('concern','smell','makerResult')"><span class="choiceNo">4</span><span class="choiceMain">花粉・ニオイ</span><span class="choiceDesc">空気環境を整えたい</span></button>
<button class="choice" onclick="go('concern','wind','makerResult')"><span class="choiceNo">5</span><span class="choiceMain">風あたり</span><span class="choiceDesc">直接風が当たるのが苦手</span></button>
<button class="choice" onclick="go('concern','power','makerResult')"><span class="choiceNo">6</span><span class="choiceMain">パワー</span><span class="choiceDesc">リビングでもしっかり効かせたい</span></button>
<button class="choice" onclick="go('concern','support','makerResult')"><span class="choiceNo">7</span><span class="choiceMain">修理・サポート</span><span class="choiceDesc">購入後も安心して使いたい</span></button>
<button class="choice" onclick="go('concern','kidsPets','makerResult')"><span class="choiceNo">8</span><span class="choiceMain">子供・ペット</span><span class="choiceDesc">家族みんなが快適に使いたい</span></button>
</div>`,50);

if(step==="makerCleaning") makeScreen("お掃除はどちらが近いですか？",`
<div class="choiceGrid">
<button class="choice" onclick="go('cleaning','auto','makerResult')"><span class="choiceNo">1</span><span class="choiceMain">任せたい</span><span class="choiceDesc">自分ではあまり掃除したくない</span></button>
<button class="choice" onclick="go('cleaning','self','makerResult')"><span class="choiceNo">2</span><span class="choiceMain">自分で掃除したい</span><span class="choiceDesc">外してしっかりお手入れしたい</span></button>
<button class="choice" onclick="go('cleaning','sterilize','makerResult')"><span class="choiceNo">3</span><span class="choiceMain">除菌重視</span><span class="choiceDesc">内部まで清潔にしたい</span></button>
<button class="choice" onclick="go('cleaning','smell','makerResult')"><span class="choiceNo">4</span><span class="choiceMain">ニオイも気になる</span><span class="choiceDesc">空気のケアも重視したい</span></button>
</div>`,75);

if(step==="makerResult") makerResult();
}

function goTokyo(v){
state.tokyo=v;
if(v==="no"){next("size");return}
next("zero");
}

function goZero(v){
state.zero=v;
if(state.type==="replace" && !(v==="senior"||v==="disabled")){next("oldAge");return}
next("size");
}

function goInstall(v){
state.install=v;
if(v==="two"){next("twoPos");return}
if(state.building==="house" && v==="standard"){next("houseStandardFloor");return}
next("piping");
}

function goPiping(v){state.piping=v;next("result")}

function stairsFee(){
const s=state.size;
if(state.stairs==="indoor") return s==="small"?2200:3300;
if(state.stairs==="outdoor") return 2200;
return 0;
}

function calc(){
const s=state.size;
let total=base[s]||0;

if(state.type==="new"){
total+=(installNew[state.install]?.[s]||0);
}else{
if(state.install==="two"){
const key=state.twoPos==="lowerPos"?"twoLower":"twoUpper";
total+=(installReplace[key]?.[s]||0);
}else{
total+=(installReplace[state.install]?.[s]||0);
}
total+=removalFee+recycleFee;
}

if(state.piping==="hidden") total+=8800;
total+=stairsFee();
return total;
}

function zeroText(){
if(state.tokyo!=="yes") return "";
if(state.zero==="senior"||state.zero==="disabled") return "🟢 対象機種が一律80,000円引きになる場合があります。詳しくはスタッフまでご相談ください。";
if(state.type==="replace") return "🟢 東京都の補助制度の対象となる可能性があります。";
return "⚪ 東京都の補助制度についてはスタッフへご相談ください。";
}

function result(){
const total=calc();
const details=[
label(state.type),
state.tokyo?"東京都："+label(state.tokyo):"",
state.zero?label(state.zero):"",
label(state.size),
label(state.building),
state.building==="house"&&state.houseFloor?"室内機の階数："+label(state.houseFloor):"",
state.building==="apartment"?"階数："+label(state.floor):"",
state.elevator?"エレベーター："+label(state.elevator):"",
state.stairs?"階段搬入："+label(state.stairs):"",
"設置方法："+label(state.install),
state.install==="two"&&state.twoPos?"二段置き："+label(state.twoPos):"",
"配管："+label(state.piping),
state.oldAge?"使用年数："+(state.oldAge==="15over"?"15年以上":state.oldAge==="under15"?"15年未満":"わからない"):""
].filter(Boolean);

document.getElementById("screen").innerHTML=`
<div class="card">
<h1>診断結果</h1>
<div class="sub">概算工事費総額</div>
<div class="resultPrice">${yen(total)}</div>
${state.type==="replace"?`<p class="sub">取り外し料・家電リサイクル料を含みます</p>`:""}
<p class="sub">この画面をスタッフへお見せください</p>
<div class="detail">
<strong>診断内容</strong><br>
${details.map(x=>"・"+x).join("<br>")}
${state.type==="replace"?`<br>・取り外し料：${yen(removalFee)}<br>・家電リサイクル料：${yen(recycleFee)}`:""}
<br><br>${zeroText()}
</div>
<div class="notice">
⚠️ 表示金額は概算工事費です。<br>
${state.type==="replace"?"⚠️ 表示金額には取り外し料・家電リサイクル料を含みます。<br>":""}
⚠️ 設置状況により追加工事費が発生する場合があります。<br>
${state.piping==="unknown"?"⚠️ 配管種類が不明のため、追加料金が発生する場合があります。<br>":""}
${state.stairs==="unknown"?"⚠️ 室外機の搬入経路によって追加料金が発生する場合があります。<br>":""}
👷 詳しくは店舗スタッフまでお気軽にご相談ください。
</div>
<button class="btn primary" onclick="next('makerConcern')">メーカー診断へ進む</button>
<button class="btn" onclick="resetAll()">ホームへ戻る</button>
</div>`;
}

const makers={
daikin:{name:"ダイキン",typeText:"快適性と省エネ性を重視するタイプ",title:"電気代・パワー・サポート重視におすすめ",tags:["省エネ","パワー","サポート"],points:["設定温度になっても弱運転で快適な温度を保ちやすい","冷えすぎ・暑くなりすぎを防ぎ、不快に感じづらい","ストリーマで菌やニオイ対策にも強い","広いお部屋やパワーが必要なお部屋にもおすすめ","空調専門メーカーで修理問い合わせも安心"]},

function recommend(){
if(state.concern==="bodyPrice") return ["general","sharp"];
if(state.concern==="electric") return ["daikin","mitsubishi"];
if(state.concern==="smell") return ["panasonic","sharp"];
if(state.concern==="wind") return ["toshiba","daikin"];
if(state.concern==="power") return ["daikin","panasonic"];
if(state.concern==="support") return ["daikin","hitachi"];
if(state.concern==="kidsPets") return ["toshiba","mitsubishi"];
if(state.concern==="clean"){
if(state.cleaning==="auto") return ["hitachi","panasonic"];
if(state.cleaning==="self") return ["mitsubishi","general"];
if(state.cleaning==="sterilize") return ["general","hitachi"];
if(state.cleaning==="smell") return ["panasonic","sharp"];
}
return ["daikin","mitsubishi"];
}

function makerBox(rank,m,type){
return `
<div class="rankBox ${type}">
<div class="rankLabel">${rank}</div>
<div class="rankTitle">${m.name}</div>
<div class="rankSub">${m.title}</div>
<div>${m.tags.map(t=>`<span class="badge">${t}</span>`).join("")}</div>
<div class="rankPoint">${m.points.map(p=>"✅ "+p).join("<br>")}</div>
</div>`;
}

function resetAll(){
for(const k in state) delete state[k];
history=[];
step="home";
render();
}
